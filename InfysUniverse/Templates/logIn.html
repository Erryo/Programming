<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Infy's Universe</title>
    <link href="/Static/Css/tailwind.css" rel="stylesheet" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdn.xeiaso.net/static/pkg/iosevka/family.css"
    />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Forum&display=swap"
      rel="stylesheet"
    />
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
  </head>
  <body
    class="bg-gradient-to-tl from-slate-500 to-sky-200 md:bg-city-map bg-cover bg-no-repeat flex flex-col items-center min-h-[100vh] justify-center"
  >
    <div
      class="bg-stone-200 md:p-10 px-5 py-8 rounded-lg border-2 border-slate-900 min-h-[55dvh] flex flex-col items-center justify-between"
    >
      <h1 class="font-extrabold text-4xl xl:text-6xl font-['Forum']">Log In</h1>
      <form
        action="/Submit/LogIn"
        method="POST"
        class="flex flex-col xl:mb-2"
        id="logIn"
      >
        <div class="flex my-3 xl:my-5">
          <span
            class="inline-flex items-center px-3 text-sm text-gray-900 bg-gray-200 border border-e-0 border-gray-300 rounded-s-md dark:bg-gray-600 dark:text-gray-400 dark:border-gray-600"
          >
            <i class="fa fa-user"></i>
          </span>
          <input
            autocomplete="username"
            form="logIn"
            required
            type="text"
            maxlength="25"
            class="rounded-none myautofill rounded-e-lg text-md xl:text-lg bg-gray-50 border border-gray-300 text-gray-900 focus:ring-blue-500 focus:border-blue-500 block flex-1 min-w-0 w-full p-2.5 dark:bg-gray-700 dark:border-gray-600 dark:placeholder-gray-400 dark:text-white dark:focus:ring-blue-500 dark:focus:border-blue-500"
            placeholder="Username"
          />
        </div>
        <div class="flex mb-3 xl:mb-5">
          <span
            class="inline-flex items-center px-3 text-sm text-gray-900 bg-gray-200 border border-e-0 border-gray-300 rounded-s-md dark:bg-gray-600 dark:text-gray-400 dark:border-gray-600"
          >
            <i class="fa fa-key"></i>
          </span>
          <input
            type="password"
            id="passField"
            required
            maxlength="40"
            autocomplete="current-password"
            class="rounded-none text-md xl:text-lg bg-gray-50 border border-gray-300 text-gray-900 focus:ring-blue-500 focus:border-blue-500 block flex-1 min-w-0 w-full p-2.5 dark:bg-gray-700 dark:border-gray-600 dark:placeholder-gray-400 dark:text-white dark:focus:ring-blue-500 dark:focus:border-blue-500"
            placeholder="Password"
          />
          <span
            class="inline-flex items-center px-3 text-sm text-gray-900 bg-gray-200 border border-s-0 border-gray-300 rounded-e-lg dark:bg-gray-600 dark:text-gray-400 dark:border-gray-600"
          >
            <span
              toggle="#passField"
              id="eye"
              class="fa fa-fw fa-eye field-icon toggle-password"
            ></span>
          </span>
        </div>
        <button
          type="submit"
          name="Alons-y"
          form="logIn"
          value="Alons-y"
          class="rounded-lg myautofill font-serif font-semibold text-xl bg-gray-50 border border-gray-300 text-gray-900 focus:ring-blue-500 focus:border-blue-500 block flex-1 min-w-0 w-full p-2.5 dark:bg-gray-700 dark:border-gray-600 dark:placeholder-gray-400 dark:text-white dark:focus:ring-blue-500 dark:focus:border-blue-500"
        >
          Alons-y
        </button>
        <a
          href="/Register"
          class="underline underline-offset-1 text-center mt-3"
          >Register</a
        >
      </form>
    </div>
    <script src="/Static/JavaScript/logIn.js"></script>
  </body>
</html>
